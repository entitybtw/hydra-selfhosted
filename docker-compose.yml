services:
  api:
    build: ./api
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/data
    environment:
      - API_TOKEN=${API_TOKEN:-change-me}
      - PORT=${PORT:-3000}
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-30}
      - PUBLIC_URL=${PUBLIC_URL:-}
    restart: unless-stopped
